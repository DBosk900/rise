name: rise
description: "RISE - Piattaforma competitiva mensile per artisti musicali indipendenti"
publish_to: 'none'
version: 1.0.0+10

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # Audio
  just_audio: ^0.9.40

  # Ads
  google_mobile_ads: ^5.1.0

  # Subscriptions
  purchases_flutter: ^8.0.0

  # Images & Files
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # UI & Animations
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Navigation
  go_router: ^14.3.0

  # State & Utils
  flutter_dotenv: ^5.2.1
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  path: ^1.9.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - assets/images/
    - assets/lottie/

  fonts:
    - family: Oswald
      fonts:
        - asset: assets/fonts/Oswald-Bold.ttf
          weight: 700
        - asset: assets/fonts/Oswald-Regular.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: InterMono
      fonts:
        - asset: assets/fonts/InterMono-Regular.ttf
